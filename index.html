<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Κρατήσεις Personal Training</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p { margin-top: 6px; opacity: 0.75; font-size: 0.95rem; }

    .container { max-width: 640px; margin: 0 auto; padding: 32px 16px; }

    /* Step indicators */
    .steps {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
      align-items: center;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #999;
    }
    .step.active { color: #1a1a2e; font-weight: 600; }
    .step.done { color: #22c55e; }
    .step-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700;
    }
    .step.active .step-num { background: #1a1a2e; color: white; }
    .step.done .step-num { background: #22c55e; color: white; }
    .step-divider { flex: 1; height: 1px; background: #e0e0e0; max-width: 40px; }

    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      display: none;
    }
    .card.active { display: block; }
    .card h2 { font-size: 1.15rem; margin-bottom: 20px; color: #1a1a2e; }

    /* Calendar nav */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-nav button {
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 1rem;
      color: #1a1a2e;
      transition: background 0.15s;
    }
    .cal-nav button:hover { background: #f0f0f0; }
    .cal-nav span { font-weight: 600; font-size: 1rem; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-day-name {
      text-align: center;
      font-size: 0.75rem;
      color: #999;
      font-weight: 600;
      padding: 4px 0 8px;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      cursor: default;
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .cal-day.empty { background: transparent; }
    .cal-day.past { color: #ccc; }
    .cal-day.today { border-color: #1a1a2e; font-weight: 700; }
    .cal-day.available {
      background: #f0fdf4;
      border-color: #86efac;
      color: #15803d;
      cursor: pointer;
      font-weight: 600;
    }
    .cal-day.available:hover { background: #dcfce7; border-color: #22c55e; }
    .cal-day.selected { background: #1a1a2e !important; color: white !important; border-color: #1a1a2e !important; }
    .cal-day.no-slots { color: #bbb; }

    /* Slots */
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .slot-btn {
      padding: 12px 8px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      font-size: 0.9rem;
    }
    .slot-btn:hover { border-color: #1a1a2e; background: #f5f5ff; }
    .slot-btn.selected { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .slot-btn .duration { font-size: 0.75rem; opacity: 0.7; margin-top: 3px; }

    .no-slots-msg {
      text-align: center;
      color: #999;
      padding: 24px 0;
      font-size: 0.95rem;
    }

    /* Form */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #1a1a2e; }

    /* Booking summary */
    .booking-summary {
      background: #f8f9ff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .booking-summary .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9rem;
      border-bottom: 1px solid #eee;
    }
    .booking-summary .row:last-child { border: none; }
    .booking-summary .row span:first-child { color: #666; }
    .booking-summary .row span:last-child { font-weight: 600; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      width: 100%;
    }
    .btn-primary { background: #1a1a2e; color: white; }
    .btn-primary:hover { background: #2d2d4e; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-outline {
      background: white;
      color: #1a1a2e;
      border: 1.5px solid #1a1a2e;
      margin-bottom: 12px;
    }
    .btn-outline:hover { background: #f5f5ff; }

    /* Success */
    .success-icon {
      width: 64px; height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    .success-card { text-align: center; }
    .success-card h2 { margin-bottom: 8px; }
    .success-card p { color: #666; font-size: 0.95rem; margin-bottom: 24px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 32px;
      color: #999;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>💪 Κρατήσεις Personal Training</h1>
  <p>Κλείστε το session σας εύκολα και γρήγορα</p>
</header>

<div class="container">

  <!-- Step indicators -->
  <div class="steps">
    <div class="step active" id="s1">
      <div class="step-num">1</div>
      <span>Ημερομηνία</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="s2">
      <div class="step-num">2</div>
      <span>Ώρα</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="s3">
      <div class="step-num">3</div>
      <span>Στοιχεία</span>
    </div>
    <div class="step-divider"></div>
    <div class="step" id="s4">
      <div class="step-num">4</div>
      <span>Επιβεβαίωση</span>
    </div>
  </div>

  <!-- Step 1: Calendar -->
  <div class="card active" id="step1">
    <h2>📅 Επίλεξε ημερομηνία</h2>
    <div class="cal-nav">
      <button id="prevMonth">‹</button>
      <span id="calTitle"></span>
      <button id="nextMonth">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Step 2: Time slots -->
  <div class="card" id="step2">
    <h2>⏰ Επίλεξε ώρα — <span id="selectedDateLabel"></span></h2>
    <div id="slotsContainer">
      <div class="loading"><div class="spinner"></div>Φόρτωση διαθέσιμων ωρών…</div>
    </div>
    <button class="btn btn-outline" style="margin-top:20px" onclick="goToStep(1)">← Πίσω</button>
  </div>

  <!-- Step 3: Personal details -->
  <div class="card" id="step3">
    <h2>👤 Τα στοιχεία σου</h2>
    <div class="booking-summary" id="bookingSummary"></div>
    <form id="bookingForm" onsubmit="submitBooking(event)">
      <div class="form-group">
        <label for="name">Ονοματεπώνυμο *</label>
        <input type="text" id="name" placeholder="π.χ. Μαρία Παπαδοπούλου" required />
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="email@example.com" required />
      </div>
      <div class="form-group">
        <label for="phone">Τηλέφωνο (προαιρετικό)</label>
        <input type="tel" id="phone" placeholder="π.χ. 6912345678" />
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Επιβεβαίωση Κράτησης →</button>
    </form>
    <button class="btn btn-outline" style="margin-top:12px" onclick="goToStep(2)">← Πίσω</button>
  </div>

  <!-- Step 4: Success -->
  <div class="card success-card" id="step4">
    <div class="success-icon">✅</div>
    <h2>Η κράτησή σου καταχωρήθηκε!</h2>
    <p>Θα λάβεις επιβεβαίωση στο email σου σύντομα.</p>
    <div class="booking-summary" id="confirmSummary"></div>
    <button class="btn btn-primary" onclick="location.reload()">Νέα Κράτηση</button>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── ΑΛΛΑΞΕ ΑΥΤΑ με τα στοιχεία σου από το Firebase Console ──
  const firebaseConfig = {
    apiKey:            "AIzaSyATXEnqexj5iUAoMWgA64mKhzeig_Tje_Q",
    authDomain:        "bar-is-loading-booking.firebaseapp.com",
    projectId:         "bar-is-loading-booking",
    storageBucket:     "bar-is-loading-booking.firebasestorage.app",
    messagingSenderId: "923651403991",
    appId:             "1:923651403991:web:8a36f66e2ab9ed85300092",
    measurementId:     "G-JHVSGRNH4V"
  };
  // ─────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── State ──
  let currentYear, currentMonth;
  let selectedDate = null;
  let selectedSlot = null;
  let availableDates = {}; // "YYYY-MM-DD" → [slot docs]

  const MONTHS_EL = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος",
                     "Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
  const DAYS_EL   = ["Κυρ","Δευ","Τρί","Τετ","Πέμ","Παρ","Σάβ"];
  const MONTHS_EL_GEN = ["Ιανουαρίου","Φεβρουαρίου","Μαρτίου","Απριλίου","Μαΐου","Ιουνίου",
                          "Ιουλίου","Αυγούστου","Σεπτεμβρίου","Οκτωβρίου","Νοεμβρίου","Δεκεμβρίου"];

  function pad(n){ return String(n).padStart(2,'0'); }

  function formatDateLabel(dateStr){
    const [y,m,d] = dateStr.split('-').map(Number);
    const dow = new Date(y,m-1,d).getDay();
    return `${DAYS_EL[dow]} ${d} ${MONTHS_EL_GEN[m-1]} ${y}`;
  }

  // ── Load slots for current month ──
  async function loadMonth(year, month){
    availableDates = {};
    try {
      const from = `${year}-${pad(month)}-01`;
      const to   = `${year}-${pad(month)}-31`;
      const q = query(
        collection(db,"slots"),
        where("date",">=",from),
        where("date","<=",to),
        where("available","==",true)
      );
      const snap = await getDocs(q);
      snap.forEach(d => {
        const data = d.data();
        if(!availableDates[data.date]) availableDates[data.date] = [];
        availableDates[data.date].push({ id: d.id, ...data });
      });
    } catch(e) {
      console.error("Firestore error:", e);
    }
    renderCalendar(year, month);
  }

  // ── Calendar ──
  function renderCalendar(year, month){
    currentYear = year; currentMonth = month;
    document.getElementById('calTitle').textContent = `${MONTHS_EL[month-1]} ${year}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    DAYS_EL.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name'; el.textContent = d;
      grid.appendChild(el);
    });

    const today = new Date(); today.setHours(0,0,0,0);
    const firstDay = new Date(year, month-1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();

    for(let i=0;i<firstDay;i++){
      const el = document.createElement('div');
      el.className='cal-day empty'; grid.appendChild(el);
    }

    for(let d=1;d<=daysInMonth;d++){
      const dateStr = `${year}-${pad(month)}-${pad(d)}`;
      const thisDate = new Date(year, month-1, d);
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;

      if(thisDate < today){
        el.classList.add('past');
      } else if(thisDate.getTime()===today.getTime()){
        el.classList.add('today');
        if(availableDates[dateStr]){ el.classList.add('available'); el.onclick=()=>pickDate(dateStr); }
      } else if(availableDates[dateStr]){
        el.classList.add('available');
        el.onclick = () => pickDate(dateStr);
      } else {
        el.classList.add('no-slots');
      }

      if(selectedDate===dateStr) el.classList.add('selected');
      grid.appendChild(el);
    }
  }

  document.getElementById('prevMonth').onclick = () => {
    let m = currentMonth-1, y = currentYear;
    if(m<1){m=12;y--;}
    loadMonth(y,m);
  };
  document.getElementById('nextMonth').onclick = () => {
    let m = currentMonth+1, y = currentYear;
    if(m>12){m=1;y++;}
    loadMonth(y,m);
  };

  // ── Pick date → show slots ──
  function pickDate(dateStr){
    selectedDate = dateStr;
    selectedSlot = null;
    document.getElementById('selectedDateLabel').textContent = formatDateLabel(dateStr);
    renderCalendar(currentYear, currentMonth);
    goToStep(2);
    renderSlots(availableDates[dateStr] || []);
  }

  function renderSlots(slots){
    const cont = document.getElementById('slotsContainer');
    if(!slots.length){
      cont.innerHTML = '<div class="no-slots-msg">Δεν υπάρχουν διαθέσιμες ώρες για αυτή την ημέρα.</div>';
      return;
    }
    slots.sort((a,b)=>a.time.localeCompare(b.time));
    cont.innerHTML = '<div class="slots-grid">' + slots.map(s => `
      <button class="slot-btn" onclick="pickSlot('${s.id}','${s.time}',${s.duration||60})">
        <strong>${s.time}</strong>
        <div class="duration">${s.duration||60} λεπτά</div>
      </button>
    `).join('') + '</div>';
  }

  // ── Pick slot ──
  window.pickSlot = function(id, time, duration){
    selectedSlot = { id, time, duration };
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    setTimeout(() => goToStep(3), 250);
    updateSummary();
  };

  function updateSummary(){
    const html = `
      <div class="row"><span>Ημερομηνία</span><span>${formatDateLabel(selectedDate)}</span></div>
      <div class="row"><span>Ώρα</span><span>${selectedSlot.time}</span></div>
      <div class="row"><span>Διάρκεια</span><span>${selectedSlot.duration} λεπτά</span></div>
    `;
    document.getElementById('bookingSummary').innerHTML = html;
  }

  // ── Submit booking ──
  window.submitBooking = async function(e){
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Αποστολή…';

    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    try {
      const slotRef = doc(db, 'slots', selectedSlot.id);
      // Check still available
      const snap = await getDocs(query(collection(db,'slots'),where('__name__','==',selectedSlot.id)));
      let stillAvail = true;
      snap.forEach(d => { if(!d.data().available) stillAvail = false; });

      if(!stillAvail){
        err.textContent = 'Λυπούμαστε, αυτή η ώρα μόλις κλείστηκε. Παρακαλώ επίλεξε άλλη.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Επιβεβαίωση Κράτησης →';
        return;
      }

      await updateDoc(slotRef, {
        available: false,
        bookedBy: { name, email, phone },
        bookedAt: serverTimestamp()
      });

      // Success
      document.getElementById('confirmSummary').innerHTML = `
        <div class="row"><span>Ονοματεπώνυμο</span><span>${name}</span></div>
        <div class="row"><span>Email</span><span>${email}</span></div>
        <div class="row"><span>Ημερομηνία</span><span>${formatDateLabel(selectedDate)}</span></div>
        <div class="row"><span>Ώρα</span><span>${selectedSlot.time}</span></div>
        <div class="row"><span>Διάρκεια</span><span>${selectedSlot.duration} λεπτά</span></div>
      `;
      goToStep(4);

    } catch(ex){
      err.textContent = 'Σφάλμα κατά την κράτηση. Παρακαλώ δοκίμασε ξανά.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Επιβεβαίωση Κράτησης →';
      console.error(ex);
    }
  };

  // ── Step navigation ──
  window.goToStep = function(n){
    document.querySelectorAll('.card').forEach((c,i) => {
      c.classList.toggle('active', i===n-1);
    });
    [1,2,3,4].forEach(i => {
      const el = document.getElementById('s'+i);
      el.classList.remove('active','done');
      if(i<n) el.classList.add('done');
      else if(i===n) el.classList.add('active');
    });
    window.scrollTo({top:0, behavior:'smooth'});
  };

  // ── Init ──
  const now = new Date();
  loadMonth(now.getFullYear(), now.getMonth()+1);
</script>

</body>
</html>
