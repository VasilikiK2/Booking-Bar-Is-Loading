<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Κρατήσεις — Bar is Loading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #94a3b8;
      --accent: #10b981;
      --accent-light: #d1fae5;
      --accent-dark: #059669;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      text-align: center;
    }
    header .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
    header .logo span { color: var(--accent); }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    .wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px 64px; }

    /* Progress */
    .progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 28px;
    }
    .p-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .p-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .p-step.active .p-dot { background: var(--accent); color: white; }
    .p-step.done .p-dot { background: var(--accent); color: white; }
    .p-step.done .p-dot::after { content: "✓"; }
    .p-step.done .p-num { display: none; }
    .p-label { font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .p-step.active .p-label { color: var(--accent); font-weight: 600; }
    .p-line { flex: 1; height: 1px; background: var(--border); max-width: 48px; margin-bottom: 20px; }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: none;
    }
    .card.active { display: block; }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* Calendar */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .cal-nav button {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav button:hover { background: var(--bg); border-color: var(--accent); }
    .cal-nav .month { font-weight: 700; font-size: 1rem; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-head {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      padding: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1.5px solid transparent;
      transition: all 0.15s;
      cursor: default;
    }
    .cal-day.past, .cal-day.off { color: #d1d5db; }
    .cal-day.today { border-color: var(--accent); font-weight: 700; color: var(--accent); }
    .cal-day.available {
      background: var(--accent-light);
      color: var(--accent-dark);
      font-weight: 700;
      cursor: pointer;
    }
    .cal-day.available:hover { background: var(--accent); color: white; transform: scale(1.08); }
    .cal-day.selected { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; transform: scale(1.08); }

    /* Time slots */
    .date-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 500;
    }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .slot {
      padding: 14px 8px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      cursor: pointer;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      transition: all 0.15s;
    }
    .slot:hover:not(.full):not(.locked) { border-color: var(--accent); color: var(--accent); }
    .slot.selected { background: var(--accent); color: white; border-color: var(--accent); }
    .slot .dur { font-size: 0.72rem; font-weight: 400; opacity: 0.7; margin-top: 3px; }
    .slot .spots { font-size: 0.72rem; margin-top: 4px; font-weight: 500; }
    .slot.almost .spots { color: #f59e0b; }
    .slot.full, .slot.locked {
      background: #f8fafc; color: #cbd5e1; border-color: #e2e8f0;
      cursor: not-allowed; pointer-events: none;
    }
    .slot.locked .spots { color: #94a3b8; }
    .no-slots { text-align: center; padding: 28px 0; color: var(--muted); font-size: 0.9rem; }

    /* Form */
    .summary-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 22px;
      border: 1px solid var(--border);
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
    }
    .summary-row:last-child { border: none; }
    .summary-row .lbl { color: var(--muted); }
    .summary-row .val { font-weight: 600; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
    .btn-ghost {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      margin-top: 10px;
    }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }

    .err {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }

    /* Success */
    .success-wrap { text-align: center; }
    .check-icon {
      width: 64px; height: 64px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 18px;
    }
    .success-wrap h2 { font-size: 1.2rem; margin-bottom: 6px; }
    .success-wrap p { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }

    /* Loader */
    .loader { text-align: center; padding: 24px; color: var(--muted); font-size: 0.875rem; }
    .spin {
      width: 28px; height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">Bar is <span>Loading</span></div>
  <p>Κλείστε το personal training session σας</p>
</header>

<div class="wrap">

  <div class="progress" id="progress">
    <div class="p-step active" id="ps1">
      <div class="p-dot"><span class="p-num">1</span></div>
      <div class="p-label">Ημερομηνία</div>
    </div>
    <div class="p-line"></div>
    <div class="p-step" id="ps2">
      <div class="p-dot"><span class="p-num">2</span></div>
      <div class="p-label">Ώρα</div>
    </div>
    <div class="p-line"></div>
    <div class="p-step" id="ps3">
      <div class="p-dot"><span class="p-num">3</span></div>
      <div class="p-label">Στοιχεία</div>
    </div>
    <div class="p-line"></div>
    <div class="p-step" id="ps4">
      <div class="p-dot"><span class="p-num">4</span></div>
      <div class="p-label">Επιβεβαίωση</div>
    </div>
  </div>

  <!-- Step 1 -->
  <div class="card active" id="step1">
    <div class="card-title">Επίλεξε ημερομηνία</div>
    <div class="cal-nav">
      <button id="prevM">&#8249;</button>
      <span class="month" id="monthLabel"></span>
      <button id="nextM">&#8250;</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Step 2 -->
  <div class="card" id="step2">
    <div class="card-title">Επίλεξε ώρα</div>
    <div class="date-label" id="dateLbl"></div>
    <div id="slotsWrap"><div class="loader"><div class="spin"></div>Φόρτωση…</div></div>
    <button class="btn btn-ghost" onclick="goStep(1)">← Πίσω</button>
  </div>

  <!-- Step 3 -->
  <div class="card" id="step3">
    <div class="card-title">Τα στοιχεία σου</div>
    <div class="summary-box" id="summaryBox"></div>
    <form onsubmit="doBook(event)">
      <div class="field">
        <label>Ονοματεπώνυμο *</label>
        <input type="text" id="fname" placeholder="π.χ. Μαρία Παπαδοπούλου" required/>
      </div>
      <div class="field">
        <label>Email *</label>
        <input type="email" id="femail" placeholder="email@example.com" required/>
      </div>
      <div class="field">
        <label>Τηλέφωνο (προαιρετικό)</label>
        <input type="tel" id="fphone" placeholder="6912345678"/>
      </div>
      <div class="err" id="ferr"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Επιβεβαίωση Κράτησης →</button>
    </form>
    <button class="btn btn-ghost" onclick="goStep(2)">← Πίσω</button>
  </div>

  <!-- Step 4 -->
  <div class="card" id="step4">
    <div class="success-wrap">
      <div class="check-icon">✓</div>
      <h2>Η κράτησή σου καταχωρήθηκε!</h2>
      <p>Θα επικοινωνήσουμε μαζί σου σύντομα για επιβεβαίωση.</p>
      <div class="summary-box" id="confirmBox"></div>
      <button class="btn btn-primary" onclick="location.reload()">Νέα Κράτηση</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, doc, getDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyATXEnqexj5iUAoMWgA64mKhzeig_Tje_Q",
  authDomain:        "bar-is-loading-booking.firebaseapp.com",
  projectId:         "bar-is-loading-booking",
  storageBucket:     "bar-is-loading-booking.firebasestorage.app",
  messagingSenderId: "923651403991",
  appId:             "1:923651403991:web:8a36f66e2ab9ed85300092",
  measurementId:     "G-JHVSGRNH4V"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Helpers ──
const pad = n => String(n).padStart(2,'0');
const MONTHS = ["Ιανουάριος","Φεβρουάριος","Μάρτιος","Απρίλιος","Μάιος","Ιούνιος","Ιούλιος","Αύγουστος","Σεπτέμβριος","Οκτώβριος","Νοέμβριος","Δεκέμβριος"];
const MONTHS_GEN = ["Ιανουαρίου","Φεβρουαρίου","Μαρτίου","Απριλίου","Μαΐου","Ιουνίου","Ιουλίου","Αυγούστου","Σεπτεμβρίου","Οκτωβρίου","Νοεμβρίου","Δεκεμβρίου"];
const DAYS_SH = ["Κυρ","Δευ","Τρί","Τετ","Πέμ","Παρ","Σάβ"];

// ── Greek public holidays ──
function getEaster(year) {
  const a=year%4, b=year%7, c=year%19;
  const d=(19*c+15)%30, e=(2*a+4*b-d+34)%7;
  const f=d+e+114, month=Math.floor(f/31), day=(f%31)+1;
  // Julian to Gregorian (+13 days for 21st century)
  const julian = new Date(year, month-1, day+13);
  return julian;
}
function getHolidays(year) {
  const fixed = [
    `${year}-01-01`, `${year}-01-06`, `${year}-03-25`,
    `${year}-05-01`, `${year}-08-15`, `${year}-10-28`,
    `${year}-12-25`, `${year}-12-26`
  ];
  const easter = getEaster(year);
  const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const variable = [
    fmt(addDays(easter,-48)), // Καθαρά Δευτέρα
    fmt(addDays(easter,-2)),  // Μεγάλη Παρασκευή
    fmt(addDays(easter,1)),   // Δευτέρα Πάσχα
    fmt(addDays(easter,50)),  // Αγίου Πνεύματος
  ];
  return new Set([...fixed, ...variable]);
}
// Cache holidays for relevant years
const holidayCache = {};
function isHoliday(dateStr) {
  const year = parseInt(dateStr.slice(0,4));
  if(!holidayCache[year]) holidayCache[year] = getHolidays(year);
  return holidayCache[year].has(dateStr);
}
function isBlocked(dateStr, dow) {
  return dow === 0 || isHoliday(dateStr); // Block Sundays and holidays
}

function dateStr(y,m,d){ return `${y}-${pad(m)}-${pad(d)}`; }
function fmtDate(s){
  const [y,m,d]=s.split('-').map(Number);
  return `${DAYS_SH[new Date(y,m-1,d).getDay()]} ${d} ${MONTHS_GEN[m-1]} ${y}`;
}

// ── State ──
let cy, cm, schedule=null, selDate=null, selTime=null, selDur=60;

// ── Load schedule ──
async function loadSchedule(){
  try {
    const snap = await getDoc(doc(db,'schedule','config'));
    if(snap.exists()) schedule = snap.data();
  } catch(e){ console.error(e); }
  if(!schedule){ schedule = { duration:60, days:{} }; }
  const now = new Date();
  cy = now.getFullYear(); cm = now.getMonth()+1;
  renderCal(cy, cm);
}

// ── Render calendar ──
function renderCal(year, month){
  cy=year; cm=month;
  document.getElementById('monthLabel').textContent = `${MONTHS[month-1]} ${year}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS_SH.forEach(d => {
    const el = document.createElement('div');
    el.className='cal-head'; el.textContent=d; grid.appendChild(el);
  });
  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(year, month-1, 1).getDay();
  const days = new Date(year, month, 0).getDate();
  for(let i=0;i<firstDay;i++){
    const el=document.createElement('div'); el.className='cal-day'; grid.appendChild(el);
  }
  for(let d=1;d<=days;d++){
    const dt = new Date(year,month-1,d);
    const ds = dateStr(year,month,d);
    const dow = dt.getDay();
    const el = document.createElement('div');
    el.className = 'cal-day';
    el.textContent = d;
    if(dt < today){
      el.classList.add('past');
    } else {
      const dayConf = schedule.days[String(dow)];
      const blocked = isBlocked(ds, dow);
      if(!blocked && dayConf && dayConf.active){
        el.classList.add('available');
        el.onclick = () => pickDate(ds);
        if(ds===selDate) el.classList.add('selected');
      } else {
        el.classList.add('off');
        if(isHoliday(ds)) el.title = 'Αργία';
        if(dow===0) el.title = 'Κυριακή — κλειστά';
      }
      if(dt.getTime()===today.getTime()) el.classList.add('today');
    }
    grid.appendChild(el);
  }
}

document.getElementById('prevM').onclick = () => { let m=cm-1,y=cy; if(m<1){m=12;y--;} renderCal(y,m); };
document.getElementById('nextM').onclick = () => { let m=cm+1,y=cy; if(m>12){m=1;y++;} renderCal(y,m); };

// ── Pick date ──
async function pickDate(ds){
  selDate = ds; selTime = null;
  renderCal(cy,cm);
  goStep(2);
  document.getElementById('dateLbl').textContent = fmtDate(ds);
  document.getElementById('slotsWrap').innerHTML = '<div class="loader"><div class="spin"></div>Φόρτωση ωρών…</div>';

  const [y,m,d] = ds.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const dayConf = schedule.days[String(dow)];
  if(!dayConf || !dayConf.active){ renderNoSlots(); return; }

  const MAX = schedule.maxPerSlot || 3;
  const dur = schedule.duration || 60;

  // Load bookings count per time + locked slots
  let bookingCount = {}, lockedSet = new Set();
  try {
    const [bSnap, lSnap] = await Promise.all([
      getDocs(query(collection(db,'bookings'), where('date','==',ds))),
      getDocs(query(collection(db,'locked'), where('date','==',ds)))
    ]);
    bSnap.forEach(d => {
      const t = d.data().time;
      bookingCount[t] = (bookingCount[t]||0) + 1;
    });
    lSnap.forEach(d => lockedSet.add(d.data().time));
  } catch(e){ console.error(e); }

  // Generate slots
  const slots = [];
  let [sh,sm] = dayConf.start.split(':').map(Number);
  let [eh,em] = dayConf.end.split(':').map(Number);
  let cur = sh*60+sm, end = eh*60+em;
  while(cur+dur <= end){
    const t = `${pad(Math.floor(cur/60))}:${pad(cur%60)}`;
    slots.push(t);
    cur += dur;
  }

  if(!slots.length){ renderNoSlots(); return; }

  const wrap = document.getElementById('slotsWrap');
  wrap.innerHTML = '<div class="slots-grid">' + slots.map(t => {
    const count = bookingCount[t]||0;
    const locked = lockedSet.has(t);
    const full = count >= MAX;
    const remaining = MAX - count;
    let cls = 'slot';
    let spotsHtml = '';
    if(locked){
      cls += ' locked';
      spotsHtml = `<div class="spots">🔒 Κλειδωμένο</div>`;
    } else if(full){
      cls += ' full';
      spotsHtml = `<div class="spots">Πλήρες</div>`;
    } else {
      if(remaining === 1) cls += ' almost';
      spotsHtml = `<div class="spots">${remaining}/${MAX} θέσεις</div>`;
    }
    const click = (!locked && !full) ? `onclick="pickTime('${t}',${dur})"` : '';
    return `<div class="${cls}" ${click}>${t}<div class="dur">${dur} λεπτά</div>${spotsHtml}</div>`;
  }).join('') + '</div>';
}

function renderNoSlots(){
  document.getElementById('slotsWrap').innerHTML = '<div class="no-slots">Δεν υπάρχουν διαθέσιμες ώρες για αυτή την ημέρα.</div>';
}

window.pickTime = function(t, dur){
  selTime = t; selDur = dur;
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  setTimeout(()=>{
    goStep(3);
    document.getElementById('summaryBox').innerHTML = `
      <div class="summary-row"><span class="lbl">Ημερομηνία</span><span class="val">${fmtDate(selDate)}</span></div>
      <div class="summary-row"><span class="lbl">Ώρα</span><span class="val">${selTime}</span></div>
      <div class="summary-row"><span class="lbl">Διάρκεια</span><span class="val">${selDur} λεπτά</span></div>
    `;
  }, 200);
};

// ── Book ──
window.doBook = async function(e){
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('ferr');
  err.style.display='none';
  btn.disabled=true; btn.textContent='Αποστολή…';
  const name  = document.getElementById('fname').value.trim();
  const email = document.getElementById('femail').value.trim();
  const phone = document.getElementById('fphone').value.trim();
  try {
    // Check not full / locked
    const MAX = schedule.maxPerSlot || 3;
    const [existing, lockedSnap] = await Promise.all([
      getDocs(query(collection(db,'bookings'), where('date','==',selDate), where('time','==',selTime))),
      getDocs(query(collection(db,'locked'), where('date','==',selDate), where('time','==',selTime)))
    ]);
    if(!lockedSnap.empty || existing.size >= MAX){
      err.textContent='Λυπούμαστε, αυτή η ώρα δεν είναι πλέον διαθέσιμη. Παρακαλώ επίλεξε άλλη.';
      err.style.display='block';
      btn.disabled=false; btn.textContent='Επιβεβαίωση Κράτησης →';
      return;
    }
    await addDoc(collection(db,'bookings'),{ date:selDate, time:selTime, duration:selDur, name, email, phone, createdAt:serverTimestamp() });
    document.getElementById('confirmBox').innerHTML = `
      <div class="summary-row"><span class="lbl">Όνομα</span><span class="val">${name}</span></div>
      <div class="summary-row"><span class="lbl">Email</span><span class="val">${email}</span></div>
      <div class="summary-row"><span class="lbl">Ημερομηνία</span><span class="val">${fmtDate(selDate)}</span></div>
      <div class="summary-row"><span class="lbl">Ώρα</span><span class="val">${selTime}</span></div>
    `;
    goStep(4);
  } catch(ex){
    err.textContent='Σφάλμα. Παρακαλώ δοκίμασε ξανά.';
    err.style.display='block';
    btn.disabled=false; btn.textContent='Επιβεβαίωση Κράτησης →';
    console.error(ex);
  }
};

// ── Navigation ──
window.goStep = function(n){
  document.querySelectorAll('.card').forEach((c,i)=> c.classList.toggle('active',i===n-1));
  [1,2,3,4].forEach(i=>{
    const el=document.getElementById('ps'+i);
    el.classList.remove('active','done');
    if(i<n) el.classList.add('done');
    else if(i===n) el.classList.add('active');
  });
  window.scrollTo({top:0,behavior:'smooth'});
};

loadSchedule();
</script>
